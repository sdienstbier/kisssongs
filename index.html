<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KISS Album Quiz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Arial Black', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #score {
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: #888;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    #score span {
      color: #c8a84b;
      font-size: 1.2rem;
    }

    h1 {
      font-size: 6rem;
      letter-spacing: 0.6rem;
      color: #c8a84b;
      text-shadow: 0 0 30px rgba(200, 168, 75, 0.6), 0 0 60px rgba(200, 168, 75, 0.2);
      margin-bottom: 32px;
      user-select: none;
    }

    #card {
      background: #141414;
      border: 2px solid #c8a84b;
      border-radius: 14px;
      padding: 32px;
      width: 100%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 0 50px rgba(200, 168, 75, 0.15), 0 20px 60px rgba(0,0,0,0.8);
    }

    #question-label {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 12px;
    }

    #song-title {
      font-size: 1.6rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 24px;
      line-height: 1.3;
    }

    /* 2x2 image grid */
    #choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .choice-btn {
      background: #1e1e1e;
      border: 2px solid #3a3a3a;
      border-radius: 8px;
      cursor: pointer;
      overflow: hidden;
      padding: 0;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      text-align: left;
    }

    .choice-btn:hover:not(:disabled) {
      border-color: #c8a84b;
      transform: scale(1.02);
    }

    .choice-btn:disabled {
      cursor: default;
    }

    .choice-btn.correct {
      border-color: #4caf50;
      box-shadow: 0 0 16px rgba(76, 175, 80, 0.5);
    }

    .choice-btn.wrong {
      border-color: #e53935;
      box-shadow: 0 0 16px rgba(229, 57, 53, 0.4);
      opacity: 0.6;
    }

    .choice-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #111;
      overflow: hidden;
    }

    .choice-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      background: #1a1a1a;
    }

    .choice-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.35s ease;
      position: relative;
    }

    .choice-img.loaded {
      opacity: 1;
    }

    .choice-label {
      padding: 8px 6px;
      font-size: 0.65rem;
      font-weight: 700;
      font-family: 'Arial Black', Arial, sans-serif;
      text-align: center;
      color: #bbb;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.3;
    }

    .choice-btn.correct .choice-label { color: #4caf50; }
    .choice-btn.wrong   .choice-label { color: #e53935; }

    #feedback {
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      min-height: 1.4em;
      margin-bottom: 16px;
    }

    #feedback.correct { color: #4caf50; }
    #feedback.wrong   { color: #e53935; }

    #next-btn {
      background: #c8a84b;
      color: #000;
      border: none;
      padding: 13px 36px;
      font-size: 0.95rem;
      font-weight: 900;
      font-family: 'Arial Black', Arial, sans-serif;
      border-radius: 7px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      transition: background 0.15s, transform 0.1s;
      display: none;
    }

    #next-btn.show { display: inline-block; }
    #next-btn:hover { background: #dbbe6a; }
    #next-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

      { title: "Outta This World",            album: "Monster" },
      { title: "All for the Glory",           album: "Monster" },
      { title: "Eat Your Heart Out",          album: "Monster" },
      { title: "The Devil Is Me",             album: "Monster" },
      { title: "Tigress",                     album: "Monster" },
      { title: "Last Chance",                 album: "Monster" },

    const allAlbums = [...new Set(songs.map(s => s.album))];
    const artCache = {};

    let correct = 0;
    let total = 0;
    let currentSong = null;

    function shuffle(arr) {
      return arr.slice().sort(() => Math.random() - 0.5);
    }

    function getChoices(correctAlbum) {
      const wrong = shuffle(allAlbums.filter(a => a !== correctAlbum)).slice(0, 3);
      return shuffle([...wrong, correctAlbum]);
    }

    async function fetchAlbumArt(albumName) {
      if (artCache[albumName] !== undefined) return artCache[albumName];
      try {
        let searchTerm;
        if (albumName === "KISS") {
          searchTerm = "KISS 1974 album";
        } else if (albumName === 'Music from "The Elder"') {
          searchTerm = "KISS The Elder";
        } else {
          searchTerm = `KISS ${albumName}`;
        }
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(searchTerm)}&entity=album&limit=10`);
        const data = await res.json();
        const match =
          data.results.find(r =>
            r.artistName.toLowerCase().includes('kiss') &&
            r.collectionName.toLowerCase().includes(albumName.replace(/"/g, '').toLowerCase())
          ) ||
          data.results.find(r => r.artistName.toLowerCase().includes('kiss'));
        if (match?.artworkUrl100) {
          const art = match.artworkUrl100.replace('100x100bb', '600x600bb');
          artCache[albumName] = art;
          return art;
        }
      } catch (e) {
        console.warn('Could not fetch album art:', e);
      }
      artCache[albumName] = null;
      return null;
    }

    function nextQuestion() {
      // Reset UI
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = '';
      document.getElementById('next-btn').classList.remove('show');

      // Pick a new song (avoid repeating last)
      let song;
      do { song = songs[Math.floor(Math.random() * songs.length)]; }
      while (songs.length > 1 && song === currentSong);
      currentSong = song;

      document.getElementById('song-title').textContent = `"${song.title}"`;

      const choices = getChoices(song.album);
      const container = document.getElementById('choices');
      container.innerHTML = '';

      // Render cards immediately with placeholders
      const btns = choices.map((album) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `
          <div class="choice-img-wrap">
            <div class="choice-placeholder">🎸</div>
            <img class="choice-img" alt="${album} cover">
          </div>
          <div class="choice-label">${album}</div>
        `;
        btn.onclick = () => handleAnswer(album, song.album);
        container.appendChild(btn);
        return btn;
      });

      // Fetch art for all choices in parallel
      choices.forEach((album, i) => {
        fetchAlbumArt(album).then(url => {
          if (!url) return;
          const img = btns[i].querySelector('.choice-img');
          const placeholder = btns[i].querySelector('.choice-placeholder');
          img.onload = () => {
            placeholder.style.display = 'none';
            img.classList.add('loaded');
          };
          img.src = url;
        });
      });
    }

    function handleAnswer(chosen, correctAlbum) {
      total++;
      const isCorrect = chosen === correctAlbum;
      if (isCorrect) correct++;

      document.getElementById('score-val').textContent = `${correct} / ${total}`;

      // Disable all buttons and highlight correct/wrong
      document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.disabled = true;
        const label = btn.querySelector('.choice-label').textContent;
        if (label === correctAlbum) btn.classList.add('correct');
        else if (label === chosen) btn.classList.add('wrong');
      });

      // Feedback text
      const feedback = document.getElementById('feedback');
      feedback.textContent = isCorrect ? 'Correct!' : `Nope — it was ${correctAlbum}`;
      feedback.className = isCorrect ? 'correct' : 'wrong';

      document.getElementById('next-btn').classList.add('show');
    }

    nextQuestion();
  </script>
