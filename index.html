<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KISS Album Quiz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Arial Black', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #score {
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: #888;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    #score span {
      color: #c8a84b;
      font-size: 1.2rem;
    }

    h1 {
      font-size: 6rem;
      letter-spacing: 0.6rem;
      color: #c8a84b;
      text-shadow: 0 0 30px rgba(200, 168, 75, 0.6), 0 0 60px rgba(200, 168, 75, 0.2);
      margin-bottom: 32px;
      user-select: none;
    }

    #card {
      background: #141414;
      border: 2px solid #c8a84b;
      border-radius: 14px;
      padding: 32px;
      width: 100%;
      max-width: 460px;
      text-align: center;
      box-shadow: 0 0 50px rgba(200, 168, 75, 0.15), 0 20px 60px rgba(0,0,0,0.8);
    }

    #question-label {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 12px;
    }

    #song-title {
      font-size: 1.6rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 28px;
      line-height: 1.3;
    }

    #choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .choice-btn {
      background: #1e1e1e;
      color: #ccc;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 0.95rem;
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      letter-spacing: 0.03em;
    }

    .choice-btn:hover:not(:disabled) {
      background: #252520;
      border-color: #c8a84b;
      color: #fff;
    }

    .choice-btn:disabled {
      cursor: default;
    }

    .choice-btn.correct {
      background: #0d2e0d;
      border-color: #4caf50;
      color: #4caf50;
    }

    .choice-btn.wrong {
      background: #2e0d0d;
      border-color: #e53935;
      color: #e53935;
    }

    /* Album reveal */
    #reveal {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.5s ease;
    }

    #reveal.show {
      max-height: 500px;
    }

    #album-cover-wrap {
      width: 260px;
      height: 260px;
      margin: 0 auto 16px;
      border-radius: 8px;
      overflow: hidden;
      background: #222;
      position: relative;
    }

    #album-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease 0.2s;
    }

    #album-cover.loaded {
      opacity: 1;
    }

    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      background: #1a1a1a;
    }

    #feedback {
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    #feedback.correct { color: #4caf50; }
    #feedback.wrong   { color: #e53935; }

    #next-btn {
      background: #c8a84b;
      color: #000;
      border: none;
      padding: 13px 36px;
      font-size: 0.95rem;
      font-weight: 900;
      font-family: 'Arial Black', Arial, sans-serif;
      border-radius: 7px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      transition: background 0.15s, transform 0.1s;
      display: none;
    }

    #next-btn.show {
      display: inline-block;
    }

    #next-btn:hover { background: #dbbe6a; }
    #next-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <div id="score">Score: <span id="score-val">0 / 0</span></div>
  <h1>KISS</h1>

  <div id="card">
    <div id="question-label">Which album is this song from?</div>
    <div id="song-title">&nbsp;</div>

    <div id="choices"></div>

    <div id="reveal">
      <div id="album-cover-wrap">
        <div id="placeholder">🎸</div>
        <img id="album-cover" src="" alt="Album Cover">
      </div>
      <div id="feedback"></div>
    </div>

    <button id="next-btn" onclick="nextQuestion()">Next Song &rarr;</button>
  </div>

  <script>
    const songs = [
      // KISS (1974)
      { title: "Strutter",            album: "KISS" },
      { title: "Nothin' to Lose",     album: "KISS" },
      { title: "Firehouse",           album: "KISS" },
      { title: "Cold Gin",            album: "KISS" },
      { title: "Deuce",               album: "KISS" },
      { title: "Black Diamond",       album: "KISS" },
      // Hotter Than Hell (1974)
      { title: "Got to Choose",       album: "Hotter Than Hell" },
      { title: "Parasite",            album: "Hotter Than Hell" },
      { title: "Hotter Than Hell",    album: "Hotter Than Hell" },
      { title: "Watchin' You",        album: "Hotter Than Hell" },
      { title: "Comin' Home",         album: "Hotter Than Hell" },
      { title: "Strange Ways",        album: "Hotter Than Hell" },
      // Dressed to Kill (1975)
      { title: "Room Service",        album: "Dressed to Kill" },
      { title: "C'mon and Love Me",   album: "Dressed to Kill" },
      { title: "She",                 album: "Dressed to Kill" },
      { title: "Love Her All I Can",  album: "Dressed to Kill" },
      { title: "Rock and Roll All Nite", album: "Dressed to Kill" },
      // Destroyer (1976)
      { title: "Detroit Rock City",   album: "Destroyer" },
      { title: "King of the Night Time World", album: "Destroyer" },
      { title: "God of Thunder",      album: "Destroyer" },
      { title: "Shout It Out Loud",   album: "Destroyer" },
      { title: "Beth",                album: "Destroyer" },
      { title: "Do You Love Me",      album: "Destroyer" },
      { title: "Flaming Youth",       album: "Destroyer" },
      // Rock and Roll Over (1976)
      { title: "I Want You",          album: "Rock and Roll Over" },
      { title: "Calling Dr. Love",    album: "Rock and Roll Over" },
      { title: "Ladies Room",         album: "Rock and Roll Over" },
      { title: "Hard Luck Woman",     album: "Rock and Roll Over" },
      { title: "Makin' Love",         album: "Rock and Roll Over" },
      { title: "Mr. Speed",           album: "Rock and Roll Over" },
      // Love Gun (1977)
      { title: "I Stole Your Love",   album: "Love Gun" },
      { title: "Christine Sixteen",   album: "Love Gun" },
      { title: "Shock Me",            album: "Love Gun" },
      { title: "Love Gun",            album: "Love Gun" },
      { title: "Plaster Caster",      album: "Love Gun" },
      { title: "Almost Human",        album: "Love Gun" },
      // Dynasty (1979)
      { title: "I Was Made for Lovin' You", album: "Dynasty" },
      { title: "Sure Know Something", album: "Dynasty" },
      { title: "2,000 Man",           album: "Dynasty" },
      { title: "X-Ray Eyes",          album: "Dynasty" },
      // Creatures of the Night (1982)
      { title: "Creatures of the Night", album: "Creatures of the Night" },
      { title: "I Love It Loud",      album: "Creatures of the Night" },
      { title: "I Still Love You",    album: "Creatures of the Night" },
      { title: "War Machine",         album: "Creatures of the Night" },
      { title: "Saint and Sinner",    album: "Creatures of the Night" },
      // Lick It Up (1983)
      { title: "Lick It Up",          album: "Lick It Up" },
      { title: "All Hell's Breakin' Loose", album: "Lick It Up" },
      { title: "Not for the Innocent", album: "Lick It Up" },
      { title: "Young and Wasted",    album: "Lick It Up" },
      // Animalize (1984)
      { title: "Heaven's on Fire",    album: "Animalize" },
      { title: "Thrills in the Night", album: "Animalize" },
      { title: "I've Had Enough (Into the Fire)", album: "Animalize" },
      { title: "Burn Bitch Burn",     album: "Animalize" },
      // Asylum (1985)
      { title: "Tears Are Falling",   album: "Asylum" },
      { title: "Who Wants to Be Lonely", album: "Asylum" },
      { title: "King of the Mountain", album: "Asylum" },
      { title: "Uh! All Night",       album: "Asylum" },
      // Crazy Nights (1987)
      { title: "Crazy Crazy Nights",  album: "Crazy Nights" },
      { title: "Reason to Live",      album: "Crazy Nights" },
      { title: "Turn on the Night",   album: "Crazy Nights" },
      { title: "No No No",            album: "Crazy Nights" },
      // Hot in the Shade (1989)
      { title: "Hide Your Heart",     album: "Hot in the Shade" },
      { title: "Forever",             album: "Hot in the Shade" },
      { title: "Rise to It",          album: "Hot in the Shade" },
      { title: "Read My Body",        album: "Hot in the Shade" },
      // Revenge (1992)
      { title: "Unholy",              album: "Revenge" },
      { title: "God Gave Rock 'n' Roll to You II", album: "Revenge" },
      { title: "Domino",              album: "Revenge" },
      { title: "Take It Off",         album: "Revenge" },
      // Psycho Circus (1998)
      { title: "Psycho Circus",       album: "Psycho Circus" },
      { title: "Within",              album: "Psycho Circus" },
      { title: "Into the Void",       album: "Psycho Circus" },
      { title: "You Wanted the Best", album: "Psycho Circus" },
    ];

    const allAlbums = [...new Set(songs.map(s => s.album))];
    const artCache = {};

    let correct = 0;
    let total = 0;
    let currentSong = null;

    function shuffle(arr) {
      return arr.slice().sort(() => Math.random() - 0.5);
    }

    function getChoices(correctAlbum) {
      const wrong = shuffle(allAlbums.filter(a => a !== correctAlbum)).slice(0, 3);
      return shuffle([...wrong, correctAlbum]);
    }

    async function fetchAlbumArt(albumName) {
      if (artCache[albumName] !== undefined) return artCache[albumName];
      try {
        const searchTerm = albumName === "KISS" ? "KISS 1974 album" : `KISS ${albumName}`;
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(searchTerm)}&entity=album&limit=10`);
        const data = await res.json();
        const match = data.results.find(r =>
          r.artistName.toLowerCase().includes('kiss') &&
          r.collectionName.toLowerCase().includes(albumName.toLowerCase())
        ) || data.results.find(r => r.artistName.toLowerCase().includes('kiss'));
        if (match?.artworkUrl100) {
          const art = match.artworkUrl100.replace('100x100bb', '600x600bb');
          artCache[albumName] = art;
          return art;
        }
      } catch (e) {
        console.warn('Could not fetch album art:', e);
      }
      artCache[albumName] = null;
      return null;
    }

    function nextQuestion() {
      // Reset UI
      document.getElementById('reveal').classList.remove('show');
      document.getElementById('next-btn').classList.remove('show');
      document.getElementById('album-cover').classList.remove('loaded');
      document.getElementById('album-cover').src = '';
      document.getElementById('placeholder').style.display = 'flex';
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = '';

      // Pick a new song (avoid repeating)
      let song;
      do { song = songs[Math.floor(Math.random() * songs.length)]; }
      while (songs.length > 1 && song === currentSong);
      currentSong = song;

      document.getElementById('song-title').textContent = `"${song.title}"`;

      const choices = getChoices(song.album);
      const container = document.getElementById('choices');
      container.innerHTML = '';

      choices.forEach(album => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = album;
        btn.onclick = () => handleAnswer(album, song.album);
        container.appendChild(btn);
      });
    }

    async function handleAnswer(chosen, correct_album) {
      total++;
      const isCorrect = chosen === correct_album;
      if (isCorrect) correct++;

      document.getElementById('score-val').textContent = `${correct} / ${total}`;

      // Disable all buttons and highlight
      document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === correct_album) btn.classList.add('correct');
        else if (btn.textContent === chosen) btn.classList.add('wrong');
      });

      // Feedback text
      const feedback = document.getElementById('feedback');
      feedback.textContent = isCorrect ? 'Correct!' : `Nope — it was ${correct_album}`;
      feedback.className = isCorrect ? 'correct' : 'wrong';

      // Reveal album art
      document.getElementById('reveal').classList.add('show');
      document.getElementById('next-btn').classList.add('show');

      const artUrl = await fetchAlbumArt(correct_album);
      if (artUrl) {
        const img = document.getElementById('album-cover');
        img.onload = () => {
          document.getElementById('placeholder').style.display = 'none';
          img.classList.add('loaded');
        };
        img.src = artUrl;
        img.alt = `${correct_album} album cover`;
      }
    }

    nextQuestion();
  </script>

</body>
</html>
